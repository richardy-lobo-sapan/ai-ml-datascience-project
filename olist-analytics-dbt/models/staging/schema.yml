version: 2

models:
  - name: stg_orders
    description: "Cleaned orders from raw Olist data"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_payments
    description: "Cleaned payment data"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - accepted_values:
              arguments:
                values: ['credit_card','boleto','voucher','debit_card','not_defined']